name: power-predict-app

services:
  gateway-service:
    image: ${GATEWAY_IMAGE:-gateway-service:local}
    profiles: ["app"]
    ports:
      - "${GATEWAY_PORT:-8080}:8080"
    environment:
      SPRING_PROFILES_ACTIVE: local
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - pp-net

  plant-service:
    image: ${PLANT_IMAGE:-plant-service:local}
    profiles: ["app"]
    environment:
      SPRING_PROFILES_ACTIVE: local
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - pp-net

  monitor-service:
    image: ${MONITOR_IMAGE:-monitor-service:local}
    profiles: ["app"]
    environment:
      SPRING_PROFILES_ACTIVE: local
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - pp-net

  forecast-service:
    image: ${FORECAST_IMAGE:-forecast-service:local}
    profiles: ["app"]
    environment:
      SPRING_PROFILES_ACTIVE: local
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - pp-net

  system-service:
    image: ${SYSTEM_IMAGE:-system-service:local}
    profiles: ["app"]
    environment:
      SPRING_PROFILES_ACTIVE: local
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - pp-net

  feature-service:
    image: ${FEATURE_IMAGE:-feature-service:local}
    profiles: ["app"]
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - pp-net

  model-service:
    image: ${MODEL_IMAGE:-model-service:local}
    profiles: ["app"]
    depends_on:
      mlflow:
        condition: service_started
    networks:
      - pp-net

  inference-service:
    image: ${INFERENCE_IMAGE:-inference-service:local}
    profiles: ["app"]
    depends_on:
      model-service:
        condition: service_started
    networks:
      - pp-net

  web-portal:
    image: ${WEB_IMAGE:-web-portal:local}
    profiles: ["app"]
    ports:
      - "${WEB_PORT:-5173}:80"
    depends_on:
      gateway-service:
        condition: service_started
    networks:
      - pp-net

networks:
  pp-net:
    external: true
    name: power-predict-infra_pp-net
