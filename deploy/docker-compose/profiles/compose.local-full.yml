services:
  postgres:
    profiles: ["local-full"]
  redis:
    profiles: ["local-full"]
  minio:
    profiles: ["local-full"]
  kafka:
    profiles: ["local-full"]
  mlflow:
    profiles: ["local-full"]

  spark:
    image: bitnami/spark:3.5
    container_name: pp-spark
    profiles: ["local-full", "compute"]
    command: ["/opt/bitnami/scripts/spark/entrypoint.sh", "/opt/bitnami/scripts/spark/run.sh"]
    ports:
      - "${SPARK_UI_PORT:-8081}:8080"
    networks:
      - pp-net

  flink-jobmanager:
    image: flink:1.19-scala_2.12-java17
    container_name: pp-flink-jobmanager
    profiles: ["local-full", "compute"]
    command: jobmanager
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
    ports:
      - "${FLINK_UI_PORT:-8082}:8081"
    networks:
      - pp-net

  flink-taskmanager:
    image: flink:1.19-scala_2.12-java17
    container_name: pp-flink-taskmanager
    profiles: ["local-full", "compute"]
    command: taskmanager
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 2
    depends_on:
      - flink-jobmanager
    networks:
      - pp-net

networks:
  pp-net:
    external: true
    name: power-predict-infra_pp-net
